# dbt connection settings. Normally these live in ~/.dbt/profiles.yml, but we
# keep them here so they travel with the project (reproducibility) and point at
# this folder via DBT_PROFILES_DIR=.
nyc_taxi:
  target: dev
  outputs:
    dev:
      type: duckdb
      # Warehouse file lives in warehouse/ one level above the dbt folder
      path: "../warehouse/nyc_taxi.duckdb"
      threads: 4
