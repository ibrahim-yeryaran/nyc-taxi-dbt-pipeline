name: 'nyc_taxi'
version: '1.0.0'
config-version: 2

# Which profile (connection settings) to use — matches the name in profiles.yml
profile: 'nyc_taxi'

# Folder paths
model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"      # compiled SQL and artifacts are written here (gitignored)
clean-targets:
  - "target"
  - "dbt_packages"

# Default materialization per layer:
#  - staging: view (lightweight/cheap)
#  - marts:   table (queried often, so persistent and fast)
models:
  nyc_taxi:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
