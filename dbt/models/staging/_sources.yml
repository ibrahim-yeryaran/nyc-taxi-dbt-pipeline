version: 2

# Sources: the raw tables that load_raw.py loads into DuckDB.
# In models we reference them as {{ source('raw', 'yellow_trips') }}.
sources:
  - name: raw
    description: "Raw NYC Taxi data loaded by load_raw.py"
    schema: raw
    tables:
      - name: yellow_trips
        description: "Yellow taxi trip records (raw, untransformed)"
      - name: taxi_zones
        description: "TLC zone lookup table (LocationID → Borough/Zone)"
