version: 2

models:
  - name: dim_zones
    description: "Taxi zone dimension (location_id → borough/zone)"
    columns:
      - name: location_id
        description: "Primary key of the zone"
        data_tests:
          - unique          # each zone once
          - not_null        # key cannot be null

  - name: fct_trips
    description: "Yellow taxi trips fact table (with derived metrics)"
    columns:
      - name: trip_id
        description: "Trip surrogate key"
        data_tests:
          - unique
          - not_null

      - name: pickup_location_id
        description: "Pickup zone — foreign key to dim_zones"
        data_tests:
          # Referential integrity: every pickup zone MUST exist in dim_zones
          - relationships:
              to: ref('dim_zones')
              field: location_id

      - name: dropoff_location_id
        description: "Dropoff zone — foreign key to dim_zones"
        data_tests:
          - relationships:
              to: ref('dim_zones')
              field: location_id

      - name: trip_duration_minutes
        description: "Trip duration (minutes)"
        data_tests:
          - not_null
