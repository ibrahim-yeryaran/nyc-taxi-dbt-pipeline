name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Lint with ruff
        run: ruff check .

      # Extract + Load: download the public NYC data into DuckDB
      - name: Load raw data
        run: python extract_load/load_raw.py

      # Transform + test: run all dbt models AND the 11 data tests
      - name: dbt build
        working-directory: dbt
        env:
          DBT_PROFILES_DIR: .
        run: dbt build
